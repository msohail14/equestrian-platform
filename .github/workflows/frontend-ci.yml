name: Frontend Admin CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend-admin/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend-admin/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-admin/package-lock.json
      - run: npm ci
        working-directory: frontend-admin
      - run: npm run lint
        working-directory: frontend-admin
      - run: npm run build
        working-directory: frontend-admin
